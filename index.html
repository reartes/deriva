<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ESTEL</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: Futura, "Futura PT", "Futura Std", "Avenir Next", Helvetica, Arial, sans-serif;
}

/* GIF full screen */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Texto centrado */
.title {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 8vw;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  text-align: center;
  white-space: nowrap;
}
</style>

</head>
<body>

<img src="./download.gif" class="bg" />

<div class="title">DERIVA</div>

</body>
